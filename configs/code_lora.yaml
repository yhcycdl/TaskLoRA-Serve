run_name: code-lora
base_model: Qwen/Qwen2.5-1.5B-Instruct
output_dir: outputs/code-lora
train_file: data/processed/code_train.jsonl
valid_file: data/processed/code_valid.jsonl

max_seq_length: 2048
learning_rate: 2.0e-4
num_train_epochs: 2
max_steps: null
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
warmup_ratio: 0.03
weight_decay: 0.01
logging_steps: 10
eval_steps: 100
save_steps: 250
seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

qlora:
  enabled: true
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

